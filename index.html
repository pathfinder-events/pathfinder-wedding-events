<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinder — Event Bar Consultation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ALL YOUR ORIGINAL STYLES REMAIN UNTOUCHED */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf7f0; --parchment: #f5ece0; --rose: #c4857a; --rose-light: #e8b4ac;
      --rose-deep: #a0685f; --sage: #8a9e8c; --gold: #c9a96e; --gold-light: #e8d5b0;
      --ink: #2e2520; --ink-soft: #5c4d47; --border: #ddd0c4;
    }
    html { scroll-behavior: smooth; }
    body { background-color: var(--cream); font-family: 'Jost', sans-serif; color: var(--ink); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 10% 10%, rgba(196,133,122,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 80% at 90% 90%, rgba(201,169,110,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 50% 50%, rgba(138,158,140,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .page-wrap { position: relative; z-index: 1; max-width: 740px; margin: 0 auto; padding: 48px 24px 80px; }
    header { text-align: center; margin-bottom: 48px; animation: fadeUp 0.9s ease both; }
    .brand-ornament { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 20px; }
    .ornament-line { height: 1px; width: 60px; background: linear-gradient(90deg, transparent, var(--gold)); }
    .ornament-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
    .ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 6vw, 4rem); font-weight: 300; letter-spacing: 0.18em; color: var(--ink); text-transform: uppercase; }
    .brand-tagline { font-size: 0.72rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--rose); margin-top: 6px; font-weight: 400; }
    .header-divider { width: 1px; height: 44px; background: linear-gradient(to bottom, var(--gold), transparent); margin: 22px auto 0; }
    .intro-block h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.5rem, 4vw, 2.1rem); font-weight: 400; font-style: italic; color: var(--ink-soft); line-height: 1.35; }
    .intro-block p { margin-top: 12px; font-size: 0.87rem; color: var(--ink-soft); line-height: 1.85; letter-spacing: 0.02em; font-weight: 300; }
    .expertise-badge { display: flex; align-items: flex-start; gap: 16px; background: linear-gradient(135deg, rgba(201,169,110,0.12), rgba(196,133,122,0.08)); border: 1px solid var(--gold-light); border-radius: 6px; padding: 20px 24px; margin-top: 28px; text-align: left; }
    .steps-overview { display: flex; gap: 0; margin-top: 32px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .step-item { flex: 1; padding: 14px 12px; text-align: center; border-right: 1px solid var(--border); background: rgba(255,255,255,0.4); }
    .step-num { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .step-name { font-family: 'Cormorant Garamond', serif; font-size: 0.92rem; font-weight: 400; color: var(--ink-soft); }
    .progress-wrap { margin-bottom: 40px; animation: fadeUp 0.9s 0.1s ease both; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); width: 0%; transition: width 0.5s; }
    .section { display: none; }
    .section.active { display: block; animation: fadeUp 0.6s ease both; }
    input, select, textarea { width: 100%; background: rgba(255,255,255,0.65); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; font-family: 'Jost', sans-serif; }
    .btn { padding: 14px 34px; cursor: pointer; border: none; font-weight: 500; text-transform: uppercase; letter-spacing: 0.2em; }
    .btn-primary { background: var(--rose); color: white; }

    /* ── ADDED CHATBOT STYLES ── */
    #chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 1000; font-family: 'Jost', sans-serif; }
    #chat-button { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); color: white; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 24px; }
    #chat-window { display: none; position: absolute; bottom: 80px; right: 0; width: 350px; height: 500px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex-direction: column; overflow: hidden; border: 1px solid var(--gold-light); }
    #chat-header { background: var(--gold); color: white; padding: 15px; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; }
    #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; }
    .msg-bot { background: var(--parchment); align-self: flex-start; }
    .msg-user { background: var(--rose-light); color: white; align-self: flex-end; }
    #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
    #chat-input { flex: 1; border: none; padding: 8px; outline: none; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="page-wrap">
  <header>
    <div class="brand-ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line right"></div></div>
    <div class="brand-name">Pathfinder</div>
    <div class="brand-tagline">Wine & Beverage Curation</div>
    <div class="intro-block"><h1>Let's craft the perfect bar for your celebration.</h1></div>
  </header>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="section active" id="section-1">
    <div class="section-title">Your Contact Details</div>
    <div class="field-group"><label>Full Name</label><input type="text" id="fullName" /></div>
    <div class="nav-row"><button class="btn btn-primary" onclick="goTo(2)">Continue →</button></div>
  </div>
  
  </div>

<div id="chat-widget">
  <button id="chat-button" onclick="toggleChat()">🍷</button>
  <div id="chat-window">
    <div id="chat-header">Pathfinder Concierge</div>
    <div id="chat-messages">
      <div class="msg msg-bot">Hello! I'm your AI concierge. Ask me anything about wine pairings or event budgets while you fill out the form.</div>
    </div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') sendChat()">
    </div>
  </div>
</div>

<script src="https://import.cdn.jetpack.com/gemini-sdk.js"></script> <script>
  // YOUR ORIGINAL FORM SCRIPT
  let currentSection = 1;
  function goTo(n) {
    document.getElementById('section-' + currentSection).classList.remove('active');
    currentSection = n;
    document.getElementById('section-' + currentSection).classList.add('active');
    document.getElementById('progress-fill').style.width = ((n-1)/3)*100 + '%';
  }

  // CHATBOT LOGIC
  function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
  }

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value;
    if(!msg) return;
    
    appendMessage(msg, 'user');
    input.value = '';
    
    // This is where your Gemini API Logic goes
    // appendMessage("Thinking...", 'bot');
  }

  function appendMessage(text, side) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + side;
    div.innerText = text;
    document.getElementById('chat-messages').appendChild(div);
  }
</script>
</body>
</html>
