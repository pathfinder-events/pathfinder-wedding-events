<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder Wedding Events | Beverage Concierge</title>
    <style>
        /* Modern, Cinematic Pathfinder Styling */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; color: #333; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a1a1a; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #d4af37; color: white; }
        .bot { align-self: flex-start; background: #fff; border: 1px solid #ddd; }
        #input-area { background: #fff; padding: 20px; display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { padding: 12px 25px; background: #1a1a1a; color: white; border: none; border-radius: 5px; margin-left: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #333; }
    </style>
</head>
<body>

<header>
    <h1>PATHFINDER</h1>
    <p>Wedding Beverage Concierge</p>
</header>

<div id="chat-container">
    <div class="message bot">Welcome, I am the Pathfinder AI. How can I help plan the beverage logistics for your celebration?</div>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Enter guests, budget, or event details...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    // Using the 2026 Google GenAI SDK directly in the browser
    import { GoogleGenAI } from "https://esm.run/@google/genai";

    // SECURITY: This asks you for your key when the page loads so it's NOT saved on GitHub
    const API_KEY = prompt("Please enter your Pathfinder Gemini API Key to activate the concierge:");
   
    const genAI = new GoogleGenAI({ apiKey: API_KEY });
    const model = genAI.getGenerativeModel({
        model: "gemini-3-flash-preview",
        systemInstruction: "You are the Pathfinder AI assistant, a professional in beverage operations. Your role: Help clients build event estimates. Mandatory Rule: Never include TABC staff in estimates. Key Knowledge: Recommend focus products that pair best with the client's supplied info and budget. Prioritize focus items silently without explicitly stating you are doing so."
    });

    window.sendMessage = async function() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const userText = input.value.trim();

        if (!userText) return;

        // Display user message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.textContent = userText;
        container.appendChild(userDiv);
        input.value = '';

        try {
            const result = await model.generateContent(userText);
            const response = await result.response;
            const botText = response.text();

            const botDiv = document.createElement('div');
            botDiv.className = 'message bot';
            botDiv.textContent = botText;
            container.appendChild(botDiv);
        } catch (error) {
            console.error("Gemini Error:", error);
            alert("Connection error. Please check your API key.");
        }

        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
