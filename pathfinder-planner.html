<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinder Beverage Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #b8860b;
  --gold-light: #d4a830;
  --gold-pale: rgba(184,134,11,0.1);
  --gold-border: rgba(184,134,11,0.25);
  --parchment: #f5ecd8;
  --parchment-mid: #faf6ee;
  --parchment-dark: #f0e8d4;
  --ink: #2c1f0e;
  --ink-mid: #5a4a30;
  --ink-soft: #8a7a55;
  --green: #4a7c59;
  --green-light: rgba(74,124,89,0.15);
  --radius: 16px;
}

body {
  font-family: 'Jost', sans-serif;
  background: linear-gradient(160deg, #f5ecd8 0%, #faf6ee 50%, #f0e8d4 100%);
  min-height: 100vh;
  padding: 14px;
  color: var(--ink);
}

/* ─── TEXTURE OVERLAY ────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ─── MAIN PANEL ─────────────────────────── */
.panel {
  background: linear-gradient(160deg, #f9f4e8 0%, #fdfaf2 50%, #f5edd8 100%);
  border: 1.5px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 22px 18px;
  position: relative;
  margin-bottom: 14px;
  box-shadow: 0 2px 16px rgba(44,31,14,0.07), inset 0 1px 0 rgba(255,255,255,0.55);
  z-index: 1;
}

/* ─── PANEL HEADER ───────────────────────── */
.panel-header {
  text-align: center;
  margin-bottom: 6px;
}

.panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 600;
  color: #7a5e16;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.panel-rule {
  display: block;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  width: 55%;
  margin: 8px auto 0;
}

/* ─── BUDGET SUMMARY BAR ─────────────────── */
.budget-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin: 12px 0 20px;
  background: var(--gold-pale);
  border: 1px solid var(--gold-border);
  border-radius: 30px;
  padding: 8px 16px;
  flex-wrap: wrap;
}

.budget-bar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.budget-bar-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: #7a5e16;
}

.budget-bar-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold-border);
  flex-shrink: 0;
}

/* ─── SPINE ──────────────────────────────── */
.tl-wrap {
  position: relative;
}

.tl-spine-track {
  position: absolute;
  left: 27px;
  top: 10px;
  bottom: 10px;
  width: 2px;
  background: rgba(184,134,11,0.12);
  border-radius: 2px;
  overflow: hidden;
  z-index: 0;
}

.tl-spine-fill {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0%;
  background: linear-gradient(to bottom, #7a5e16, var(--gold-light));
  border-radius: 2px;
  transition: height 0.8s ease;
}

/* ─── TIMELINE ROW ───────────────────────── */
.tl-row {
  position: relative;
  z-index: 1;
  margin-bottom: 4px;
}

.tl-row-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 6px 0;
  cursor: pointer;
  border-radius: 12px;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.tl-row-head:active { background: rgba(184,134,11,0.06); }

.tl-icon-wrap {
  width: 54px;
  height: 54px;
  flex-shrink: 0;
  transition: transform 0.25s ease;
  position: relative;
  z-index: 2;
}

.tl-row-head:hover .tl-icon-wrap,
.tl-row-head:active .tl-icon-wrap { transform: scale(1.07); }

.tl-row-text { flex: 1; min-width: 0; }

.tl-row-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.03em;
  line-height: 1.1;
  transition: color 0.2s;
}

.tl-row.filled .tl-row-label { color: #7a5e16; }

.tl-row-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--ink-soft);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.tl-row-logged {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--green);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
  display: none;
}

.tl-row.filled .tl-row-logged { display: block; }

.tl-tap-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1.5px solid var(--gold-border);
  background: rgba(253,250,242,0.7);
  color: var(--ink-soft);
  font-size: 20px;
  font-weight: 300;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.25s;
  font-family: 'Jost', sans-serif;
}

.tl-tap-btn:hover { border-color: var(--gold); color: var(--gold); }
.tl-tap-btn.open { background: var(--gold); border-color: var(--gold); color: white; transform: rotate(45deg); }
.tl-tap-btn.filled { background: var(--green); border-color: var(--green); color: white; font-size: 14px; }
.tl-tap-btn.filled:hover { background: #3a6648; }

/* ─── INLINE EXPANDED AREA ───────────────── */
.tl-expand {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  opacity: 0;
  padding-left: 68px;
}

.tl-expand.open {
  max-height: 200px;
  opacity: 1;
}

.tl-expand-inner {
  padding: 10px 0 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tl-expand-logged {
  display: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--ink-mid);
  background: var(--green-light);
  border: 1px solid rgba(74,124,89,0.2);
  border-radius: 8px;
  padding: 8px 12px;
  line-height: 1.5;
}

.tl-expand.has-note .tl-expand-logged { display: block; }

.tl-input-row {
  display: flex;
  gap: 8px;
}

.tl-input {
  flex: 1;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  border: 1px solid var(--gold-border);
  background: rgba(253,250,242,0.95);
  color: var(--ink);
  padding: 9px 13px;
  border-radius: 9px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.tl-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
}

.tl-input::placeholder { color: rgba(138,106,27,0.35); font-style: italic; }

.tl-log-btn {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 9px 16px;
  border-radius: 9px;
  border: none;
  background: linear-gradient(135deg, #7a5e16, var(--gold));
  color: #faf6ee;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.tl-log-btn:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); transform: translateY(-1px); }

.tl-edit-btn {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
  background: none;
  border: 1px solid var(--gold-border);
  border-radius: 7px;
  padding: 5px 10px;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  transition: all 0.2s;
  align-self: flex-start;
}

.tl-edit-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ─── DIVIDER BETWEEN ROWS ───────────────── */
.tl-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(184,134,11,0.12), transparent);
  margin: 2px 0 2px 68px;
}

/* ─── PROGRESS ───────────────────────────── */
.progress-wrap {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-bar {
  flex: 1;
  height: 3px;
  background: rgba(184,134,11,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(to right, #7a5e16, var(--gold-light));
  border-radius: 2px;
  transition: width 0.7s ease;
}

.progress-label {
  font-size: 10px;
  font-style: italic;
  color: var(--ink-soft);
  font-family: 'Cormorant Garamond', serif;
  white-space: nowrap;
}

/* ─── CALC SNAPSHOT ──────────────────────── */
.calc-snap {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.calc-pill {
  background: var(--gold-pale);
  border: 1px solid var(--gold-border);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  color: var(--ink-mid);
}

/* ─── NOTEPAD ────────────────────────────── */
.np-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.np-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gold-border);
}

.np-page {
  background: #fdfaf2;
  border: 1px solid rgba(184,134,11,0.18);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
  position: relative;
}

.np-margin {
  position: absolute;
  left: 38px; top: 0; bottom: 0;
  width: 1px;
  background: rgba(201,125,125,0.18);
  pointer-events: none;
}

.np-textarea {
  width: 100%;
  min-height: 240px;
  border: none;
  background: transparent;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  color: var(--ink);
  line-height: 28px;
  resize: none;
  overflow-y: auto;
  max-height: 420px;
  outline: none;
  padding: 14px 16px 14px 50px;
  background-image: repeating-linear-gradient(
    transparent, transparent 27px,
    rgba(184,134,11,0.1) 27px, rgba(184,134,11,0.1) 28px
  );
}

.np-textarea::placeholder {
  color: rgba(138,106,27,0.3);
  font-style: italic;
}

/* ─── FOOTER ─────────────────────────────── */
.footer-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.char-count {
  font-size: 10px;
  font-style: italic;
  color: var(--ink-soft);
  font-family: 'Cormorant Garamond', serif;
}

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

.btn {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-outline {
  color: #7a5e16;
  border: 1px solid rgba(122,94,22,0.4);
  background: transparent;
}
.btn-outline:hover { background: var(--gold-pale); }

.btn-fill {
  color: #faf6ee;
  border: none;
  background: linear-gradient(135deg, #7a5e16, var(--gold));
}
.btn-fill:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); transform: translateY(-1px); }

.save-msg {
  font-size: 11px;
  color: var(--green);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  opacity: 0;
  transition: opacity 0.3s;
  align-self: center;
}
.save-msg.show { opacity: 1; }

/* ─── TIER CARDS ─────────────────────────── */
.tier-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 12px;
}

@media (max-width: 500px) {
  .tier-grid { grid-template-columns: 1fr; }
}

.tier-card {
  background: #fdfaf2;
  border: 1px solid rgba(184,134,11,0.18);
  border-radius: 13px;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tier-card.hl {
  border-color: var(--gold);
  background: rgba(184,134,11,0.03);
  box-shadow: 0 0 0 1px rgba(184,134,11,0.12);
}

.tier-badge-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.tier-badge {
  font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--ink-soft); background: rgba(184,134,11,0.1); padding: 2px 8px; border-radius: 20px;
}

.tier-pop {
  font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  color: #7a5e16; background: rgba(184,134,11,0.14); border: 1px solid rgba(184,134,11,0.28);
  padding: 2px 8px; border-radius: 20px;
}

.tier-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 600; color: var(--ink);
}
.tier-card.hl .tier-name { color: #7a5e16; }

.tier-desc {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-style: italic; color: var(--ink-soft); line-height: 1.4;
}

.tier-feats { list-style: none; display: flex; flex-direction: column; gap: 5px; flex: 1; }
.tier-feats li {
  display: flex; gap: 6px;
  font-family: 'Cormorant Garamond', serif; font-size: 12px; color: var(--ink-mid); line-height: 1.4;
}
.tier-feats li::before { content: '•'; color: var(--gold); flex-shrink: 0; }

.tier-pricing { border-top: 1px solid rgba(184,134,11,0.18); padding-top: 10px; }

.tier-per-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--ink-soft); margin-bottom: 3px;
}

.tier-per {
  font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--ink);
}
.tier-per span { font-size: 11px; font-family: 'Jost',sans-serif; font-weight: 400; color: var(--ink-soft); }

.tier-total {
  background: var(--gold-pale); border: 1px solid rgba(184,134,11,0.16);
  border-radius: 8px; padding: 7px 10px; margin-top: 7px;
}

.tier-total-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-soft);
}

.tier-total-val {
  font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; color: #7a5e16; margin-top: 2px;
}

.spacer { height: 14px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     TIMELINE PANEL
     ═══════════════════════════════════ -->
<div class="panel" id="timelinePanel">

  <div class="panel-header">
    <p class="panel-title">Wedding Day Timeline</p>
    <span class="panel-rule"></span>
  </div>

  <!-- Budget summary bar — updates from calculator -->
  <div class="budget-bar" id="budgetBar">
    <span class="budget-bar-label">Est. budget</span>
    <span class="budget-bar-dot"></span>
    <span class="budget-bar-value" id="budgetMin">—</span>
    <span class="budget-bar-label" style="color:var(--ink-soft)">to</span>
    <span class="budget-bar-value" id="budgetMax">—</span>
    <span class="budget-bar-dot"></span>
    <span class="budget-bar-label" id="budgetGuests">Set guest count in Calculator</span>
  </div>

  <!-- Calc snapshot pills -->
  <div class="calc-snap" id="calcSnap"></div>

  <!-- Timeline rows injected by JS -->
  <div class="tl-wrap" id="tlWrap">
    <div class="tl-spine-track"><div class="tl-spine-fill" id="spineFill"></div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-label" id="progressLabel">0 of 9 moments noted</span>
  </div>

</div>

<div class="spacer"></div>

<!-- ═══════════════════════════════════
     NOTEPAD PANEL
     ═══════════════════════════════════ -->
<div class="panel">

  <div class="panel-header" style="margin-bottom:16px;">
    <p class="panel-title">Beverage Planner</p>
    <span class="panel-rule"></span>
    <p style="font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--ink-soft);margin-top:8px;">
      Gather your ideas, beverages, wishes, and inspirations here.
    </p>
  </div>

  <div class="np-page">
    <div class="np-margin"></div>
    <textarea class="np-textarea" id="notepad" placeholder="Start jotting down ideas…"></textarea>
  </div>

  <div class="footer-bar">
    <span class="char-count" id="charCount"></span>
    <div class="btn-group">
      <button class="btn btn-outline" onclick="clearAll()">✕ Clear</button>
      <button class="btn btn-outline" onclick="printNotes()">⎙ Print</button>
      <button class="btn btn-fill" onclick="savePlanner()">✓ Save</button>
      <span class="save-msg" id="saveMsg"></span>
    </div>
  </div>

</div>

<div class="spacer"></div>

<!-- ═══════════════════════════════════
     TIER PRICING PANEL
     ═══════════════════════════════════ -->
<div class="panel">
  <div class="panel-header" style="margin-bottom:16px;">
    <p class="panel-title">Package Pricing Reference</p>
    <span class="panel-rule"></span>
    <p class="panel-subtitle" id="tierSubtitle" style="font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--ink-soft);margin-top:6px;">
      Estimated costs based on your guest count
    </p>
  </div>
  <div class="tier-grid" id="tierGrid"></div>
</div>

<script>
/* ════════════════════════════════════════
   SEGMENTS
   ════════════════════════════════════════ */
var segments = [
  { id:'arrival',  label:'Arrival',       sub:'Drinks on arrival' },
  { id:'ceremony', label:'Ceremony',      sub:'The ceremony' },
  { id:'cocktail', label:'Cocktail Hour', sub:'Cocktail hour service' },
  { id:'dinner',   label:'Dinner',        sub:'Seated dinner service' },
  { id:'cake',     label:'Cake Cutting',  sub:'Cake & dessert service' },
  { id:'toast',    label:'Toast',         sub:'Champagne & speeches' },
  { id:'dancing',  label:'Dancing',       sub:'Dancing & open bar' },
  { id:'late',     label:'Late Night',    sub:'Late night bar service' },
  { id:'farewell', label:'Farewell',      sub:'Final send-off' }
];

/* ════════════════════════════════════════
   ICONS
   ════════════════════════════════════════ */
function makeIcon(type, state, size) {
  size = size || 54;
  var s = state || 'default';
  var gold  = s==='filled' ? '#d4a830' : s==='active' ? '#6aab7a' : '#c4b07a';
  var bg    = s==='filled' ? '#2c1f0e' : s==='active' ? '#1a3322' : '#f5ecd8';
  var rim   = s==='filled' ? '#b8860b' : s==='active' ? '#4a7c59' : '#8a6d1b';

  var art = {
    arrival:
      '<circle cx="29" cy="29" r="27" fill="'+bg+'" stroke="'+rim+'" stroke-width="1.5"/>'+
      '<circle cx="29" cy="29" r="22" fill="none" stroke="'+gold+'" stroke-width="0.5" opacity="0.35"/>'+
      '<polygon points="29,8 31,27 29,31 27,27" fill="'+gold+'" opacity="0.9"/>'+
      '<polygon points="29,50 31,31 29,27 27,31" fill="'+gold+'" opacity="0.35"/>'+
      '<polygon points="8,29 27,27 31,29 27,31" fill="'+gold+'" opacity="0.55"/>'+
      '<polygon points="50,29 31,27 27,29 31,31" fill="'+gold+'" opacity="0.25"/>'+
      '<circle cx="29" cy="29" r="4" fill="'+gold+'" stroke="'+bg+'" stroke-width="1"/>'+
      '<circle cx="29" cy="29" r="1.5" fill="'+bg+'"/>',
    ceremony:
      '<circle cx="29" cy="29" r="27" fill="'+bg+'" stroke="'+rim+'" stroke-width="1.5"/>'+
      '<circle cx="22" cy="27" r="9" fill="none" stroke="'+gold+'" stroke-width="1.8"/>'+
      '<circle cx="36" cy="27" r="9" fill="none" stroke="'+gold+'" stroke-width="1.8"/>'+
      '<circle cx="22" cy="27" r="5" fill="none" stroke="'+gold+'" stroke-width="0.5" opacity="0.3"/>'+

/* ════════════════════════════════════════
   BUILD ROWS
   ════════════════════════════════════════ */
var tlNotes = {};
var wrap = document.getElementById('tlWrap');

segments.forEach(function(seg, i) {
  // Row head
  var row = document.createElement('div');
  row.className = 'tl-row';
  row.id = 'row-' + seg.id;

  var head = document.createElement('div');
  head.className = 'tl-row-head';

  var iconW = document.createElement('div');
  iconW.className = 'tl-icon-wrap';
  iconW.id = 'icon-' + seg.id;
  iconW.innerHTML = makeIcon(seg.id, 'default');

  var text = document.createElement('div');
  text.className = 'tl-row-text';
  text.innerHTML =
    '<div class="tl-row-label">' + seg.label + '</div>' +
    '<div class="tl-row-sub">' + seg.sub + '</div>' +
    '<div class="tl-row-logged" id="logged-' + seg.id + '"></div>';

  var btn = document.createElement('button');
  btn.className = 'tl-tap-btn';
  btn.id = 'tapbtn-' + seg.id;
  btn.innerHTML = '+';
  btn.setAttribute('aria-label', 'Add note for ' + seg.label);

  head.appendChild(iconW);
  head.appendChild(text);
  head.appendChild(btn);
  row.appendChild(head);

  // Expand area
  var expand = document.createElement('div');
  expand.className = 'tl-expand';
  expand.id = 'expand-' + seg.id;

  var inner = document.createElement('div');
  inner.className = 'tl-expand-inner';

  var loggedDisplay = document.createElement('div');
  loggedDisplay.className = 'tl-expand-logged';
  loggedDisplay.id = 'expandNote-' + seg.id;

  var inputRow = document.createElement('div');
  inputRow.className = 'tl-input-row';

  var input = document.createElement('input');
  input.className = 'tl-input';
  input.id = 'input-' + seg.id;
  input.placeholder = seg.sub + '…';
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') logNote(seg.id); });

  var logBtn = document.createElement('button');
  logBtn.className = 'tl-log-btn';
  logBtn.textContent = 'Log';
  logBtn.onclick = function() { logNote(seg.id); };

  inputRow.appendChild(input);
  inputRow.appendChild(logBtn);

  var editBtn = document.createElement('button');
  editBtn.className = 'tl-edit-btn';
  editBtn.id = 'editbtn-' + seg.id;
  editBtn.textContent = 'Edit note';
  editBtn.style.display = 'none';
  editBtn.onclick = function() { editNote(seg.id); };

  inner.appendChild(loggedDisplay);
  inner.appendChild(inputRow);
  inner.appendChild(editBtn);
  expand.appendChild(inner);
  row.appendChild(expand);

  // Divider (not after last)
  if (i < segments.length - 1) {
    var div = document.createElement('div');
    div.className = 'tl-divider';
    row.appendChild(div);
  }

  wrap.appendChild(row);

  // Click handlers
  head.addEventListener('click', function(e) {
    if (btn.contains(e.target)) return;
    toggleExpand(seg.id);
  });
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleExpand(seg.id);
  });
});

function toggleExpand(id) {
  var expand = document.getElementById('expand-' + id);
  var btn    = document.getElementById('tapbtn-' + id);
  var isOpen = expand.classList.contains('open');

  // Close all others
  segments.forEach(function(s) {
    if (s.id !== id) {
      document.getElementById('expand-' + s.id).classList.remove('open');
      var ob = document.getElementById('tapbtn-' + s.id);
      if (!tlNotes[s.id]) { ob.classList.remove('open'); ob.innerHTML = '+'; }
    }
  });

  if (isOpen) {
    expand.classList.remove('open');
    if (!tlNotes[id]) { btn.classList.remove('open'); btn.innerHTML = '+'; }
    document.getElementById('icon-' + id).innerHTML = makeIcon(id, tlNotes[id] ? 'filled' : 'default');
  } else {
    expand.classList.add('open');
    btn.classList.add('open');
    btn.innerHTML = '+';
    document.getElementById('icon-' + id).innerHTML = makeIcon(id, 'active');
    var input = document.getElementById('input-' + id);
    if (!tlNotes[id]) {
      input.value = '';
      input.style.display = 'block';
      document.getElementById('editbtn-' + id).style.display = 'none';
      document.getElementById('expandNote-' + id).textContent = '';
      expand.classList.remove('has-note');
      setTimeout(function() { input.focus(); }, 50);
    }
  }
}

function logNote(id) {
  var input = document.getElementById('input-' + id);
  var val = input.value.trim();
  if (!val) return;

  tlNotes[id] = val;

  // Icon
  document.getElementById('icon-' + id).innerHTML = makeIcon(id, 'filled');

  // Button
  var btn = document.getElementById('tapbtn-' + id);
  btn.classList.remove('open');
  btn.classList.add('filled');
  btn.innerHTML = '✓';

  // Row label color
  document.getElementById('row-' + id).classList.add('filled');

  // Logged preview on row
  var logged = document.getElementById('logged-' + id);
  logged.textContent = val;

  // Expand: show note, hide input, show edit
  var expand = document.getElementById('expand-' + id);
  var expandNote = document.getElementById('expandNote-' + id);
  expandNote.textContent = val;
  expand.classList.add('has-note');
  input.style.display = 'none';
  document.getElementById('editbtn-' + id).style.display = 'inline-block';

  updateProgress();
  updateBudgetBar();
  savePlanner();

  // Close after short delay
  setTimeout(function() { expand.classList.remove('open'); }, 600);
}

function editNote(id) {
  var input = document.getElementById('input-' + id);
  input.value = tlNotes[id] || '';
  input.style.display = 'block';
  document.getElementById('editbtn-' + id).style.display = 'none';
  document.getElementById('expand-' + id).classList.remove('has-note');
  setTimeout(function() { input.focus(); }, 50);
}

function updateProgress() {
  var count = Object.keys(tlNotes).length;
  var pct = Math.round((count / segments.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('spineFill').style.height = pct + '%';
  document.getElementById('progressLabel').textContent = count + ' of ' + segments.length + ' moments noted';
}

var currentGuests = 0;

function updateBudgetBar() {
  if (currentGuests <= 0) return;
  var minTotal = currentGuests * 12;
  var maxTotal = currentGuests * 55;
  var fmt = function(n) { return n.toLocaleString('en-US', {style:'currency',currency:'USD',maximumFractionDigits:0}); };
  document.getElementById('budgetMin').textContent = fmt(minTotal);
  document.getElementById('budgetMax').textContent = fmt(maxTotal);
  document.getElementById('budgetGuests').textContent = 'for ' + currentGuests + ' guests across all tiers';
}

var pad = document.getElementById('notepad');

function clearAll() {
  if ((pad.value.trim() || Object.keys(tlNotes).length > 0) && !confirm('Clear all notes and timeline entries?')) return;
  pad.value = ''; countEl.textContent = ''; tlNotes = {};
  segments.forEach(function(seg) {
    document.getElementById('icon-'+seg.id).innerHTML = makeIcon(seg.id,'default');
    var btn = document.getElementById('tapbtn-'+seg.id);
    btn.classList.remove('filled','open'); btn.innerHTML = '+';
    document.getElementById('row-'+seg.id).classList.remove('filled');
    document.getElementById('logged-'+seg.id).textContent = '';
    var expand = document.getElementById('expand-'+seg.id);
    expand.classList.remove('open','has-note');
    var input = document.getElementById('input-'+seg.id);
    input.value=''; input.style.display='block';
    document.getElementById('editbtn-'+seg.id).style.display='none';
    document.getElementById('expandNote-'+seg.id).textContent='';
  });
  updateProgress();
  try { localStorage.removeItem('pathfinder-planner'); } catch(e) {}
}

function printNotes() {
  var tlHTML = segments.filter(function(s){return tlNotes[s.id];}).map(function(s){
    return '<div style="margin-bottom:10px;padding:10px 14px;border:1px solid #d4a830;border-radius:8px;">'+
      '<strong style="color:#7a5e16;font-size:14px;">'+s.label+'</strong>'+
      '<p style="font-style:italic;color:#5a4a30;margin:4px 0 0;font-size:13px;">'+tlNotes[s.id]+'</p></div>';
  }).join('');

  var w = window.open('','_blank');
  w.document.write('<html><head><title>Pathfinder Beverage Planner</title>'+
    '<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">'+
    '<style>body{font-family:"Cormorant Garamond",serif;max-width:600px;margin:40px auto;color:#2c1f0e;padding:0 20px}'+
    'h1{font-size:22px;color:#7a5e16;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:4px}'+
    '.sub{text-align:center;font-style:italic;color:#8a7a55;font-size:13px}'+
    '.rule{height:1px;background:linear-gradient(to right,transparent,#b8860b,transparent);width:60%;margin:10px auto 20px}'+
    'h2{font-size:15px;color:#7a5e16;letter-spacing:.08em;text-transform:uppercase;margin:24px 0 10px}'+
    '.notes{white-space:pre-wrap;font-size:15px;line-height:1.8}'+
    '.ft{margin-top:30px;font-size:12px;color:#8a7a55;text-align:center;font-style:italic;border-top:1px solid #d4a830;padding-top:10px}'+
    '</style></head><body>'+
    '<h1>Pathfinder Beverage Planner</h1><div class="sub">Your ideas and inspirations</div><div class="rule"></div>'+
    (tlHTML ? '<h2>Wedding Day Timeline</h2><div>'+tlHTML+'</div>' : '')+
    (pad.value ? '<h2>Additional Notes</h2><div class="notes">'+pad.value+'</div>' : '')+
    '<div class="ft">Pathfinder Wine & Beverage Curation &middot; Est. 2026</div>'+
    '</body></html>');
  w.document.close(); w.print();
}

function savePlanner() {
  var data = { timeline: tlNotes, notepad: pad.value, savedAt: new Date().toLocaleString() };
  try {
    localStorage.setItem('pathfinder-planner', JSON.stringify(data));
    var msg = document.getElementById('saveMsg');
    msg.textContent = 'Saved ✓'; msg.classList.add('show');
    setTimeout(function(){ msg.classList.remove('show'); }, 2500);
  } catch(e) { alert('Unable to save — storage may be disabled.'); }
}

function loadPlanner() {
  try {
    var raw = localStorage.getItem('pathfinder-planner');
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.timeline) {
      Object.keys(data.timeline).forEach(function(id) {
        var val = data.timeline[id];
        if (!val) return;
        tlNotes[id] = val;
        document.getElementById('icon-'+id).innerHTML = makeIcon(id,'filled');
        var btn = document.getElementById('tapbtn-'+id);
        btn.classList.add('filled'); btn.innerHTML = '✓';
        document.getElementById('row-'+id).classList.add('filled');
        document.getElementById('logged-'+id).textContent = val;
        document.getElementById('expandNote-'+id).textContent = val;
        var input = document.getElementById('input-'+id);
        if (input) input.style.display = 'none';
        var editBtn = document.getElementById('editbtn-'+id);
        if (editBtn) editBtn.style.display = 'inline-block';
        var expand = document.getElementById('expand-'+id);
        if (expand) expand.classList.add('has-note');
      });
      updateProgress();
    }
    if (data.notepad) {
      pad.value = data.notepad;
      countEl.textContent = pad.value.length > 0 ? pad.value.length + ' characters' : '';
    }
  } catch(e) {}
}

loadPlanner();
pad.addEventListener('blur', function(){ if (pad.value.trim()) savePlanner(); });

window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'add-to-planner') {
    var line = '🍷 '+(d.category ? d.category+': ':'')+d.product;
    if (d.note) line += ' — '+d.note;
    appendToNotepad(line);
  }

  if (d.type === 'calculator-update') {
    currentGuests = d.guests || currentGuests;
    tierGuests = currentGuests;
    renderTiers();
    updateBudgetBar();

    var snap = document.getElementById('calcSnap');
    snap.style.display = 'flex';
    snap.innerHTML =
      '<span class="calc-pill">👥 <strong>'+d.guests+'</strong> Guests</span>'+
      '<span class="calc-pill">🕐 <strong>'+d.hours+'</strong> Hours</span>'+
      '<span class="calc-pill">🍷 '+d.wineBottles+' btls wine</span>'+
      '<span class="calc-pill">🍺 '+d.beerCans+' cans beer</span>'+
      '<span class="calc-pill">🥃 '+d.liq750+' btls spirits</span>';
  }

  if (d.type === 'event-info') {
    var parts=[];
    if(d.date) parts.push('📅 '+d.date);
    if(d.start) parts.push('⏰ '+d.start);
    if(d.guests) parts.push('👥 '+d.guests+' guests');
    if(d.duration) parts.push('🕐 Bar: '+d.duration);
    if(d.vibe) parts.push('✨ Vibe: '+d.vibe);
    if(parts.length) appendToNotepad(parts.join('\n'));
  }
});

function appendToNotepad(text) {
  pad.value = pad.value.trim() ? pad.value.trimEnd()+'\n'+text : text;
  countEl.textContent = pad.value.length > 0 ? pad.value.length+' characters' : '';
  savePlanner();
}
</script>
</body>
